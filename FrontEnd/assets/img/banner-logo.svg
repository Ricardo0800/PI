<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Fundo verde oliva escuro -->
  <rect width="1200" height="400" fill="#153d01"/>
  
  <!-- Logo aumentada (reposicionada e escalada) -->
  
  
  <!-- Título em texto grande -->
  <text x="550" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">
    ET Education
  </text>
  
  <!-- Subtítulo -->
  <text x="550" y="220" font-family="Arial, sans-serif" font-size="36" fill="#e8f5e9" text-anchor="middle" opacity="0.9">
    Learn Through Gaming
  </text>
  
  <!-- Linha decorativa -->
  <line x1="300" y1="260" x2="800" y2="260" stroke="#b3e5fc" stroke-width="3" opacity="0.6"/>
</svg>
