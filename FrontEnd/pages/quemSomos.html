<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem Somos - Jogos na Educação</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Ajustes de Responsividade (Adicionados) --- */

        /* 1. Cards de Membros: Ajusta o layout dos cards para telas menores */
        @media screen and (max-width: 768px) {
            /* Em celulares, os cards ocupam metade da largura (duas colunas) */
            .column.is-one-quarter {
                width: 50% !important; /* Sobrescreve Bulma para 2 colunas */
            }
        }
        @media screen and (max-width: 480px) {
            /* Em celulares muito pequenos, os cards ocupam a largura total (uma coluna) */
            .column.is-one-quarter {
                width: 100% !important; /* Sobrescreve Bulma para 1 coluna */
            }
        }

        /* 2. Navbar: O Bulma já é responsivo, mas garantimos o comportamento do menu em mobile */
        /* Nota: O Bulma requer um toggle JavaScript para o menu mobile, mas os estilos base estão aqui */

        /* Fim dos Ajustes de Responsividade */

        
        .team-member-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .team-member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card-footer-item {
            font-weight: bold;
            color: #4a4a4a;
        }
    </style>
</head>
<body>

            <h1 class="title" id="title">ET Education</h1>
        </a>
        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
        </a>
    </div>
    <div id="navbarBasicExample" class="navbar-menu">
        <div class="navbar-start">
            <a class="navbar-item" href="../../index.html">Início</a>
            <a class="navbar-item" href="biblioteca.html">Biblioteca</a>
            <a class="navbar-item" href="materiais.html">Materiais</a>
            <a class="navbar-item" href="quemSomos.html">Quem Somos</a>
        </div>
        <div class="navbar-end">
            <div class="navbar-item" id="nav-buttons">
                <div class="buttons">
                    <button class="button is-light" id="loginButton"><strong>Entrar</strong></button>
                    <button class="button is-danger is-hidden" id="logoutButton"><strong>Sair</strong></button>

            </div>
        </div>
    </div>
</header>

<section class="section">

        <p class="subtitle has-text-centered">As mentes por trás do projeto "ET Education".</p>
        
        <div class="columns is-multiline is-centered mt-5 is-mobile">

            <div class="column is-one-quarter is-half-mobile is-full-mobile">

                    <div class="card-content has-text-centered">
                        <p class="title is-4">Guilherme Cunha</p>

            <div class="column is-one-quarter is-half-mobile is-full-mobile">
                <div class="card team-member-card">
                    <div class="card-content has-text-centered">

            <div class="column is-one-quarter is-half-mobile is-full-mobile">
                <div class="card team-member-card">
                    <div class="card-content has-text-centered">

            <div class="column is-one-quarter is-half-mobile is-full-mobile">
                <div class="card team-member-card">
                    <div class="card-content has-text-centered">

            </div>
            
            <div class="column is-one-quarter is-half-mobile is-full-mobile">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabaseConfig.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- Lógica do Menu Hamburger ---
        const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
        if ($navbarBurgers.length > 0) {
            $navbarBurgers.forEach(el => {
                el.addEventListener('click', () => {
                    const target = el.dataset.target;
                    const $target = document.getElementById(target);
                    el.classList.toggle('is-active');
                    $target.classList.toggle('is-active');
                });
            });
        }

        const loginButton = document.getElementById("loginButton");
        const logoutButton = document.getElementById("logoutButton");

        supabaseClient.auth.onAuthStateChange((_, session) => {
            const user = session?.user;
            loginButton.classList.toggle("is-hidden", !!user);
            logoutButton.classList.toggle("is-hidden", !user);
        });

        logoutButton.addEventListener("click", async () => {
            await supabaseClient.auth.signOut();
            // Redireciona para a página inicial após o logout
            window.location.href = "../index.html";
        });

        loginButton.addEventListener("click", () => {
            // Se o utilizador não está logado e clica em Entrar, manda-o para a página inicial para abrir o modal.
            window.location.href = "../index.html";
        });
    });
</script>

</body>
