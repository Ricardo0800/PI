<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET Education - Criar Conta</title>
        <link rel="shortcut icon" href="/frontend/assets/img/favSvg.svg" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#16A34A',
                            600: '#15803D',
                            700: '#166534',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8 sm:p-10">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center overflow-hidden">
                        <img src="/frontend/assets/img/favSvg.svg" alt="ET Education" class="w-full h-full object-cover">
                    </div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Criar sua conta</h1>
            <p class="text-gray-600">Comece sua jornada de aprendizado hoje</p>
        </div>

        <!-- Message -->
        <div id="message" class="hidden mb-6"></div>

        <!-- Form -->
        <form id="signup-form" class="space-y-5">
            <div>
                <label for="name" class="block text-gray-900 font-semibold text-sm mb-2">Nome completo</label>
                <input type="text" id="name" placeholder="João Silva" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
            </div>

            <div>
                <label for="email" class="block text-gray-900 font-semibold text-sm mb-2">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
            </div>

            <div>
                <label for="password" class="block text-gray-900 font-semibold text-sm mb-2">Senha (mínimo 6 caracteres)</label>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
            </div>

            <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white px-4 py-3.5 rounded-lg font-semibold transition flex items-center justify-center gap-2 shadow-lg shadow-primary-500/30">
                <i class="fas fa-user-plus"></i>
                Criar conta
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="px-3 text-sm text-gray-500">ou cadastre-se com</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <!-- Google Button -->
        <button id="registerWithGoogle" class="w-full bg-white hover:bg-gray-50 text-gray-900 border border-gray-300 px-4 py-3.5 rounded-lg font-semibold transition flex items-center justify-center gap-2">
            <i class="fab fa-google text-lg"></i>
            Google
        </button>

        <!-- Login Link -->
        <p class="text-center text-gray-600 text-sm mt-6">
            Já tem uma conta? <a href="../../index.html" class="text-primary-500 font-semibold hover:underline">Fazer login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabaseConfig.js"></script>
    <script>
        const form = document.getElementById("signup-form");
        const googleButton = document.getElementById("registerWithGoogle");
        const messageEl = document.getElementById("message");

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = type === 'success' 
                ? 'bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg text-sm text-center' 
                : 'bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg text-sm text-center';
            messageEl.classList.remove("hidden");
        }

        function hideMessage() {
            messageEl.classList.add("hidden");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            hideMessage();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const { error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name } }
                });
                
                if (error) throw error;
                
                showMessage("Sucesso! Verifique seu email para confirmar a conta.", "success");
                form.reset();
            } catch (error) {
                showMessage(error.message, "error");
            }
        });

        googleButton.addEventListener("click", async () => {
            hideMessage();
            
            const { error } = await supabaseClient.auth.signInWithOAuth({ 
                provider: "google",
                options: {
                    redirectTo: window.location.origin
                }
            });
            
            if (error) {
                showMessage("Erro ao tentar cadastro com o Google.", "error");
            }
        });
    </script>
</body>
</html>
